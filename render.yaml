services:
  - type: web
    name: bons-voisins
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bons-voisins-db
          property: connectionString
      - key: ADMIN_PIN
        generateValue: true

databases:
  - name: bons-voisins-db
    plan: free
